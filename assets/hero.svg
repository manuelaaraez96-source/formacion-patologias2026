<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Formación en tricología">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#f6edff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b5bf5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="640" cy="120" r="170" fill="#7c3aed" opacity="0.10"/>
  <circle cx="160" cy="480" r="130" fill="#5b5bf5" opacity="0.10"/>

  <!-- “lupa” de análisis capilar -->
  <circle cx="330" cy="270" r="150" fill="#fff" opacity="0.92"/>
  <circle cx="330" cy="270" r="150" fill="none" stroke="url(#card)" stroke-width="6" opacity="0.5"/>
  <g stroke="#7c3aed" stroke-width="7" stroke-linecap="round" opacity="0.65">
    <line x1="270" y1="200" x2="280" y2="350"/>
    <line x1="310" y1="190" x2="318" y2="355"/>
    <line x1="350" y1="190" x2="356" y2="352"/>
    <line x1="390" y1="200" x2="394" y2="348"/>
  </g>
  <g stroke="#5b5bf5" stroke-width="5" stroke-linecap="round" opacity="0.45">
    <line x1="290" y1="195" x2="298" y2="350"/>
    <line x1="330" y1="188" x2="337" y2="354"/>
    <line x1="370" y1="195" x2="375" y2="350"/>
  </g>
  <line x1="438" y1="378" x2="510" y2="450" stroke="url(#card)" stroke-width="16" stroke-linecap="round"/>

  <text x="560" y="300" text-anchor="middle" font-family="Inter, Arial" font-size="64">🔬</text>
  <text x="400" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#8a8f9a">
    Sustituye esta imagen por una foto real (assets/hero.jpg)
  </text>
</svg>
