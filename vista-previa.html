/* =========================================================================
   SISTEMA DE DISEÑO — LANDING JALDÚN
   Estética editorial inspirada en eventos.jaldun.com
   Titulares y texto: Montserrat (la del PDF del programa)
   Fondo cálido, tinta casi negra, acentos lavanda, esquinas rectas.
   El contenido se edita en config.js (no aquí).
   ========================================================================= */

/* ---------------------- 1. VARIABLES (tema) ---------------------- */
:root {
  /* Paleta extraída de eventos.jaldun.com */
  --paper:       hsl(40 20% 98%);   /* fondo cálido */
  --paper-2:     hsl(40 15% 94%);   /* gris cálido (secciones alternas) */
  --ink:         hsl(0 0% 8%);      /* texto casi negro */
  --muted:       hsl(0 0% 40%);     /* texto secundario */
  --card:        #ffffff;
  --hairline:    hsl(0 0% 88%);     /* líneas finas */
  --border:      hsl(0 0% 90%);

  --lavender:        hsl(246 70% 86%);
  --lavender-deep:   hsl(246 55% 70%);
  --lavender-deeper: hsl(246 48% 60%);
  --lavender-soft:   hsl(246 70% 95%);

  /* Tipografía del programa: Montserrat (titulares y texto) */
  --font-serif: "Montserrat", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-sans:  "Montserrat", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

  /* Radios (editorial: casi rectos) */
  --r:    4px;
  --r-lg: 6px;

  /* Layout */
  --maxw: 1140px;
  --gap: clamp(1rem, 2.5vw, 1.75rem);
}

/* ---------------------- 2. RESET ---------------------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; scroll-padding-top: 90px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
ul { list-style: none; }
button { font-family: inherit; cursor: pointer; }

h1, h2, h3, .serif { font-family: var(--font-serif); font-weight: 700; letter-spacing: -0.02em; }

/* ---------------------- 3. LAYOUT ---------------------- */
.container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(1.2rem, 4vw, 2rem); }
.container--narrow { max-width: 760px; }

.section { padding: clamp(4rem, 8vw, 6.5rem) 0; }
.section--alt { background: var(--paper-2); }

.section__head { max-width: 720px; margin: 0 0 clamp(2.5rem, 5vw, 3.5rem); }
.section__title {
  font-family: var(--font-serif); font-weight: 700;
  font-size: clamp(1.9rem, 4.5vw, 3rem); line-height: 1.1; letter-spacing: -0.02em;
}
.section__subtitle {
  margin-top: 1rem; font-size: clamp(1.02rem, 2vw, 1.18rem);
  color: var(--muted); max-width: 60ch;
}

.grid { display: grid; gap: var(--gap); }
.grid--2 { grid-template-columns: repeat(2, 1fr); }
.grid--3 { grid-template-columns: repeat(3, 1fr); }
.grid--4 { grid-template-columns: repeat(4, 1fr); }
.grid--speakers { grid-template-columns: repeat(3, 1fr); }

/* Resalte lavanda (subrayado tipo rotulador) */
.hl {
  background: linear-gradient(transparent 8%, var(--lavender) 8% 92%, transparent 92%);
  color: inherit; padding: 0 .1em; border-radius: 2px;
  -webkit-box-decoration-break: clone; box-decoration-break: clone;
}

/* ---------------------- 4. BOTONES ---------------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  font-family: var(--font-sans); font-weight: 600; font-size: .95rem; line-height: 1;
  padding: .85rem 1.6rem; border-radius: 999px; border: 1px solid transparent;
  transition: transform .18s ease, background .2s ease, box-shadow .2s ease, color .2s ease;
  white-space: nowrap;
}
.btn--primary { background: hsl(249 62% 67%); color: #fff; }
.btn--primary:hover { background: hsl(249 55% 59%); color: #fff; transform: translateY(-1px); }
.btn--primary:active { transform: translateY(0); }
.btn--ghost { background: transparent; border-color: var(--ink); color: var(--ink); }
.btn--ghost:hover { background: var(--ink); color: var(--paper); }
.btn--sm { padding: .6rem 1.15rem; font-size: .88rem; }
.btn--lg { padding: 1rem 2rem; font-size: 1.02rem; }
.btn--block { width: 100%; }

/* ---------------------- 5. NAVBAR ---------------------- */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: hsl(40 20% 98% / .82); backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid transparent; transition: border-color .3s ease;
}
.navbar.scrolled { border-bottom-color: var(--hairline); }
.navbar__inner { display: flex; align-items: center; justify-content: space-between; height: 70px; gap: 1rem; }
.navbar__logo { font-family: var(--font-serif); font-weight: 800; font-size: 1.5rem; letter-spacing: -.01em; display: inline-flex; align-items: center; }
.navbar__logo img { height: 34px; width: auto; display: block; }
.navbar__links { display: flex; gap: 2rem; }
.navbar__links a { color: var(--muted); font-weight: 500; font-size: .92rem; transition: color .2s; }
.navbar__links a:hover { color: var(--ink); }

/* ---------------------- 6. HERO ---------------------- */
.hero { position: relative; padding: 130px 0 clamp(2rem, 5vw, 3.5rem); overflow: hidden; isolation: isolate; }
.hero__bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
.hero__bg-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(95deg, rgba(251,250,247,.82) 0%, rgba(251,250,247,.60) 50%, rgba(251,250,247,.38) 100%);
}
.hero__inner { position: relative; z-index: 2; display: grid; grid-template-columns: 1.1fr .9fr; align-items: center; gap: clamp(2rem, 5vw, 4.5rem); }
.hero__badge {
  display: inline-flex; align-items: center; gap: .55rem;
  font-size: .78rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: var(--lavender-deeper); margin-bottom: 1.5rem;
}
.hero__badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--lavender-deep); }
.hero__title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: clamp(1.9rem, 4.6vw, 3.1rem); line-height: 1.12; letter-spacing: -0.01em;
}
.hero__subtitle { margin-top: 1.5rem; font-size: clamp(1.05rem, 2.2vw, 1.22rem); color: var(--muted); max-width: 540px; }
.hero__meta { display: flex; flex-wrap: wrap; gap: .4rem 0; margin: 1.9rem 0; max-width: 560px; }
.hero__meta-item {
  flex: 1 1 0; min-width: 120px;
  display: flex; flex-direction: column; gap: .35rem;
  padding: .1rem 1.25rem; border-left: 1px solid rgba(20,21,26,.16);
}
.hero__meta-item:first-child { padding-left: 0; border-left: 0; }
.hero__meta-label { font-size: .68rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.hero__meta-value { font-size: .98rem; font-weight: 600; color: var(--ink); line-height: 1.25; }
.hero__actions { display: flex; flex-wrap: wrap; align-items: center; gap: .8rem; margin-top: .5rem; }

@media (max-width: 600px) {
  .hero__meta { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem 1.3rem; }
  .hero__meta-item { padding: 0; border-left: 0; }
}

.hero__media { position: relative; display: flex; justify-content: center; }
.hero__image-wrap {
  position: relative; width: 100%; max-width: 420px; aspect-ratio: 1 / 1;
  border-radius: 50%; overflow: hidden; background: transparent;
}
.hero__image-wrap img { width: 100%; height: 100%; object-fit: cover; }
.hero__glow {
  position: absolute; top: -15%; right: -8%; width: 50vw; height: 50vw; max-width: 620px; max-height: 620px;
  background: radial-gradient(circle, hsl(246 70% 86% / .35), transparent 62%);
  z-index: -1; filter: blur(10px);
}

/* Cuenta atrás */
.countdown { display: flex; gap: clamp(.8rem, 2vw, 1.6rem); margin-top: 2.2rem; flex-wrap: wrap; }
.cd { display: flex; flex-direction: column; align-items: flex-start; min-width: 56px; }
.cd__num {
  font-family: var(--font-serif); font-weight: 700; font-variant-numeric: tabular-nums;
  font-size: clamp(1.8rem, 4vw, 2.6rem); line-height: 1; color: var(--ink);
}
.cd__lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-top: .45rem; }
.cd--done { font-family: var(--font-serif); font-size: 1.2rem; color: var(--lavender-deeper); }

/* ---------------------- 7. FRANJA (ticker) ---------------------- */
.ticker { border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); background: var(--paper); overflow: hidden; }
.ticker__track {
  display: flex; align-items: center; width: max-content;
  animation: ticker-scroll 80s linear infinite;
}
.ticker:hover .ticker__track { animation-play-state: paused; }
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.ticker__item {
  display: inline-flex; align-items: center; white-space: nowrap; padding: 1.05rem 0;
  font-size: .8rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
}
.ticker__item::after {
  content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--lavender-deep);
  margin: 0 1.9rem; flex: 0 0 auto;
}

/* ---------------------- 8. TARJETAS ---------------------- */
.card {
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r);
  padding: clamp(1.4rem, 3vw, 2rem);
  transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}
.grid .card:hover { transform: translateY(-6px); border-color: var(--lavender-deep); background: var(--lavender-soft); box-shadow: 0 18px 38px hsl(246 42% 45% / .16); }
.card__icon {
  font-size: 1.5rem; line-height: 1; margin-bottom: 1.1rem; color: var(--lavender-deeper);
  width: 48px; height: 48px; display: inline-flex; align-items: center; justify-content: center;
  background: var(--lavender-soft); border-radius: var(--r);
}
.card__icon svg { width: 24px; height: 24px; }
.card__title { font-family: var(--font-serif); font-weight: 600; font-size: 1.3rem; margin-bottom: .55rem; letter-spacing: -.01em; }
.card__text { color: var(--muted); font-size: .97rem; }

/* Etiqueta (eyebrow) sobre los títulos de sección */
.eyebrow {
  display: block; font-size: .75rem; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--lavender-deeper); margin-bottom: 1rem;
}

/* Temario — rejilla integrada con divisores finos y sombreado al pasar el ratón */
.topics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--hairline);
  border: 1px solid var(--hairline); border-radius: var(--r);
}
.topics .topic {
  background: var(--card); padding: 1.9rem 1.8rem 2.1rem; position: relative;
  transition: background .25s ease, transform .25s ease, box-shadow .25s ease;
}
.topics .topic:hover {
  background: var(--lavender-soft); transform: translateY(-6px);
  box-shadow: 0 18px 38px hsl(246 42% 45% / .18); z-index: 2; border-radius: var(--r);
}
@media (max-width: 860px) { .topics { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .topics { grid-template-columns: 1fr; } }

.topic__num {
  font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; color: var(--lavender-deeper);
  display: block; margin-bottom: .7rem; line-height: 1;
}

/* Evento (datos) */
.fact { text-align: left; }
.fact__icon {
  font-size: 1.3rem; margin-bottom: .8rem; width: 44px; height: 44px; color: var(--lavender-deeper);
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--lavender-soft); border-radius: var(--r);
}
.fact__icon svg { width: 22px; height: 22px; }
.fact__label { font-size: .76rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 600; }
.fact__value { font-size: 1.05rem; font-weight: 600; margin-top: .2rem; font-family: var(--font-serif); }

/* --- Sección oscura integrada (estilo eventos.jaldun.com · detalles del evento) --- */
.section--dark { background: #0e0e13; color: #fff; }
.section--dark .section__title { color: #fff; }
.section--dark .section__subtitle { color: rgba(255,255,255,.55); }

.facts {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: rgba(255,255,255,.13);
  border: 1px solid rgba(255,255,255,.13); border-radius: var(--r); overflow: hidden;
}
.facts .fact { background: #0e0e13; padding: 1.9rem 1.6rem 2.1rem; text-align: left; }
.facts .fact__icon {
  width: auto; height: auto; background: none; border-radius: 0;
  color: #fff; margin-bottom: 1.5rem; font-size: 1.3rem;
}
.facts .fact__icon svg { width: 24px; height: 24px; stroke-width: 1.5; }
.facts .fact__label { color: rgba(255,255,255,.5); letter-spacing: .12em; }
.facts .fact__value { color: #fff; font-weight: 500; margin-top: .35rem; }
.btn--ghost-light { background: transparent; border-color: rgba(255,255,255,.4); color: #fff; margin-top: .4rem; }
.btn--ghost-light:hover { background: #fff; color: #0e0e13; border-color: #fff; }
.fact__cta { display: flex; width: calc(100% + 1.1rem); white-space: normal; text-align: left; justify-content: flex-start; border-radius: 10px; padding: .9rem 1.1rem; margin-left: -1.1rem; }

@media (max-width: 860px) { .facts { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 460px) { .facts { grid-template-columns: 1fr; } }

/* ---------------------- 9. PONENTES ---------------------- */
/* Fondo sutil de hebras de cabello para la sección de ponentes */
.section--hairs {
  background-color: #eef0f7;
  background-image: url(data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyODAiIGhlaWdodD0iMTAwMCIgdmlld0JveD0iMCAwIDI4MCAxMDAwIj4KICA8ZyBmaWxsPSJub25lIiBzdHJva2U9IiNjNGM5ZTIiIHN0cm9rZS13aWR0aD0iMS4yIiBvcGFjaXR5PSIwLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCI+CiAgICA8cGF0aCBkPSJNMjggMCBDIDU4IDI1MCA0IDUwMCAyOCA3NDAgQyA0NiA4ODAgMTYgOTQwIDI4IDEwMDAiLz4KICAgIDxwYXRoIGQ9Ik04NCAwIEMgMTE2IDIxMCA2NiA0NzAgOTAgNzIwIEMgMTA2IDg2MCA3OCA5NTAgODQgMTAwMCIvPgogICAgPHBhdGggZD0iTTE1MCAwIEMgMTg0IDI2MCAxMjIgNTIwIDE1MCA3NzAgQyAxNjggODkwIDE0MCA5NjAgMTUwIDEwMDAiLz4KICAgIDxwYXRoIGQ9Ik0yMTAgMCBDIDI0MCAyMzAgMTg4IDUwMCAyMTQgNzYwIEMgMjMwIDg4MCAyMDQgOTUwIDIxMCAxMDAwIi8+CiAgICA8cGF0aCBkPSJNMjU4IDAgQyAyODYgMjQwIDIzMiA1MDAgMjU2IDc3MCBDIDI3MCA4OTAgMjQ4IDk1MCAyNTggMTAwMCIvPgogIDwvZz4KICA8ZyBmaWxsPSJub25lIiBzdHJva2U9IiNjZmQzZWEiIHN0cm9rZS13aWR0aD0iMC45IiBvcGFjaXR5PSIwLjQiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCI+CiAgICA8cGF0aCBkPSJNNTQgMCBDIDgwIDIyMCAzNiA0ODAgNTggNzMwIEMgNzIgODcwIDUwIDk1MCA1NCAxMDAwIi8+CiAgICA8cGF0aCBkPSJNMTIwIDAgQyAxNTAgMjQwIDk2IDUwMCAxMjIgNzYwIEMgMTM4IDg4MCAxMTIgOTYwIDEyMCAxMDAwIi8+CiAgICA8cGF0aCBkPSJNMTg0IDAgQyAyMTIgMjEwIDE2MiA0NzAgMTg2IDcyMCBDIDIwMCA4NjAgMTc2IDk1MCAxODQgMTAwMCIvPgogIDwvZz4KPC9zdmc+Cg==);
  background-repeat: repeat; background-size: 280px 1000px;
}

.speaker {
  text-align: left; background: rgba(255,255,255,.85);
  border: 1px solid var(--hairline); border-radius: var(--r);
  padding: 2.3rem 2rem 2rem;
  transition: background .25s ease, border-color .25s ease, box-shadow .25s ease, transform .25s ease;
}
.grid--speakers .speaker:hover {
  background: var(--lavender-soft); border-color: var(--lavender-deep);
  box-shadow: 0 18px 38px hsl(246 45% 45% / .16); transform: translateY(-6px);
}
.speaker__photo {
  width: 116px; height: 116px; border-radius: 50%; object-fit: cover; object-position: center 22%;
  margin: 0 0 1.4rem; border: 4px solid #fff; box-shadow: 0 4px 14px rgba(16,18,30,.12);
  background: var(--paper-2);
}
.speaker__eyebrow {
  font-size: .72rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: .5rem;
}
.speaker__name { font-family: var(--font-serif); font-weight: 700; font-size: 1.4rem; letter-spacing: -.01em; }
.speaker__role {
  color: var(--lavender-deeper); font-weight: 600; font-size: .78rem;
  letter-spacing: .08em; text-transform: uppercase; margin-top: .55rem; line-height: 1.45;
}
.speaker__bio { color: var(--muted); font-size: .95rem; margin: 1rem 0 0; }
.speaker__social { display: flex; gap: .6rem; }
.speaker__social a {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--hairline);
  display: inline-flex; align-items: center; justify-content: center; color: var(--ink);
  transition: all .2s;
}
.speaker__social a:hover { background: var(--lavender-deep); color: #fff; border-color: var(--lavender-deep); }
.speaker__social svg { width: 16px; height: 16px; }

/* ---------------------- 10. ACORDEÓN (FAQ) ---------------------- */
/* --- Condiciones de acceso (precios) --- */
.price-card {
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r);
  padding: clamp(1.8rem, 3vw, 2.5rem); display: flex; flex-direction: column;
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.price-card:hover { transform: translateY(-5px); box-shadow: 0 18px 38px hsl(246 42% 45% / .14); }
.price-card--featured { border-color: var(--lavender-deep); box-shadow: 0 12px 32px hsl(246 45% 45% / .12); }
.price-card__opt { font-size: .76rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--lavender-deeper); margin-bottom: 1rem; }
.price-card__title { font-family: var(--font-serif); font-weight: 600; font-size: 1.25rem; color: var(--ink); }
.price-card__amount { font-family: var(--font-serif); font-weight: 700; font-size: clamp(2.4rem, 5vw, 3.2rem); color: var(--ink); margin: .5rem 0 1.1rem; letter-spacing: -.02em; line-height: 1; }
.price-card__desc { color: var(--muted); font-size: .97rem; }
.price-card__desc { margin-bottom: 1.5rem; }
.price-card__highlight {
  margin-top: auto; background: var(--lavender-soft); border-radius: var(--r);
  padding: 1.05rem 1.2rem; color: var(--ink); font-size: .92rem; line-height: 1.55;
}
.condiciones-nota { text-align: center; color: var(--muted); font-size: .92rem; margin-top: 2rem; }
.temario-nota { text-align: center; color: var(--muted); font-size: .92rem; margin-top: 2rem; }

.accordion { display: flex; flex-direction: column; border-top: 1px solid var(--hairline); }
.acc-item { border-bottom: 1px solid var(--hairline); }
.acc-head {
  width: 100%; text-align: left; background: none; border: none;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  padding: 1.4rem .2rem; font-family: var(--font-serif); font-size: 1.18rem; font-weight: 600; color: var(--ink);
}
.acc-icon { flex: 0 0 auto; width: 22px; height: 22px; position: relative; }
.acc-icon::before, .acc-icon::after { content: ""; position: absolute; background: var(--lavender-deeper); border-radius: 2px; }
.acc-icon::before { top: 50%; left: 2px; right: 2px; height: 2px; transform: translateY(-50%); }
.acc-icon::after  { left: 50%; top: 2px; bottom: 2px; width: 2px; transform: translateX(-50%); transition: opacity .3s; }
.acc-item.open .acc-icon::after { opacity: 0; }
.acc-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.acc-body p { padding: 0 .2rem 1.4rem; color: var(--muted); max-width: 65ch; }

/* ---------------------- 11. FORMULARIO ---------------------- */
.form-section { background: var(--lavender); }
.form-section .section__head { text-align: center; margin-left: auto; margin-right: auto; }
.form-card {
  background: var(--card); border: 1px solid var(--hairline); border-radius: var(--r-lg);
  padding: clamp(1.8rem, 4vw, 3rem);
  box-shadow: 0 30px 70px hsl(246 50% 38% / .18);
}
.form-badge {
  display: inline-block; background: var(--lavender); color: var(--ink);
  font-size: .72rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
  padding: .45rem 1rem; border-radius: 999px; margin-bottom: 1.5rem;
}
.form-benefits { list-style: none; margin: 0; display: flex; flex-direction: column; gap: .85rem; }
.form-benefits li { display: flex; align-items: flex-start; gap: .7rem; color: var(--ink); font-size: 1rem; }
.form-benefits li svg { width: 20px; height: 20px; color: var(--lavender-deeper); flex: 0 0 auto; margin-top: .15rem; }
.form-divider { height: 1px; background: var(--hairline); margin: 1.9rem 0; }
.form-embed-label { display: block; margin-bottom: 1.2rem; }
/* Contenedor del formulario embebido (iframe GoHighLevel).
   El script de GHL intenta poner el iframe en position:absolute con un ancho en
   píxeles (lo que lo hacía "sangrar" fuera de la tarjeta). Forzándolo a
   position:static queda SIEMPRE en el flujo normal: ni se sale, ni colapsa la
   caja, ni se recorta por abajo. max-width:100% lo limita al ancho de la tarjeta
   y margin:0 auto lo centra. */
#form-embed { width: 100%; max-width: 100%; border-radius: var(--r); text-align: center; }
#form-embed iframe {
  position: static !important;
  width: 100% !important; max-width: 100% !important; min-width: 0 !important;
  /* El script de GHL a veces fija el iframe a 500/800px y mete el formulario
     (≈998px desktop / ≈1074px móvil) dentro con scroll interno (malo para CRO).
     Forzamos con !important una altura que SIEMPRE supere la del formulario:
     así no hay scroll interno. El sobrante es el iframe transparente mostrando
     la tarjeta blanca (parece padding). El script no usa !important, así que ganamos. */
  height: 1020px !important; min-height: 1020px !important; max-height: none !important;
  border: 0; display: block; margin: 0 auto;
}
@media (max-width: 560px) {
  #form-embed iframe { height: 1100px !important; min-height: 1100px !important; }
}

/* ---------------------- 12. FOOTER (claro, editorial) ---------------------- */
.footer { background: #0e0e13; color: rgba(255,255,255,.55); padding: clamp(3.5rem, 6vw, 5rem) 0 2rem; }
.footer__inner { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 2.5rem; }
.footer__logo { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 800; color: #fff; display: block; margin-bottom: 1.1rem; }
.footer__logo img { height: 42px; width: auto; filter: brightness(0) invert(1); }
.footer__brand p { max-width: 340px; font-size: .95rem; color: rgba(255,255,255,.5); }
.footer__social { display: flex; gap: .6rem; margin-top: 1.3rem; }
.footer__social a {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,.18);
  display: inline-flex; align-items: center; justify-content: center; color: #fff; transition: all .2s;
}
.footer__social a:hover { background: var(--lavender-deep); color: var(--ink); border-color: var(--lavender-deep); transform: translateY(-2px); }
.footer__social svg { width: 18px; height: 18px; }
.footer__col h4 { color: #fff; font-family: var(--font-sans); font-weight: 600; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 1.1rem; }
.footer__col a { display: block; color: rgba(255,255,255,.55); font-size: .95rem; margin-bottom: .7rem; transition: color .2s; }
.footer__col a:hover { color: #fff; }
.footer__bottom { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,.12); font-size: .86rem; color: rgba(255,255,255,.4); text-align: center; }

/* ---------------------- 13. CTA FLOTANTE (móvil) ---------------------- */
.floating-cta {
  position: fixed; left: 1rem; right: 1rem; bottom: 1rem; z-index: 90;
  display: none; text-align: center; padding: 1rem; border-radius: 999px;
  background: hsl(249 62% 67%); color: #fff; font-weight: 700;
  box-shadow: 0 10px 30px hsl(246 40% 50% / .3);
}

/* ---------------------- 14. ANIMACIONES ---------------------- */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s ease, transform .7s ease; }
.reveal.in { opacity: 1; transform: none; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .reveal { opacity: 1; transform: none; transition: none; }
  * { animation: none !important; }
}

/* ---------------------- 15. RESPONSIVE ---------------------- */
@media (max-width: 980px) {
  .hero__inner { grid-template-columns: 1fr; }
  .hero__media { order: -1; max-width: 360px; margin: 0 auto; }
  .grid--3, .grid--speakers { grid-template-columns: repeat(2, 1fr); }
  .grid--4 { grid-template-columns: repeat(2, 1fr); }
  .footer__inner { grid-template-columns: 1fr 1fr; }
  .footer__brand { grid-column: 1 / -1; }

  .grid--2, .grid--3, .grid--speakers { grid-template-columns: 1fr; }

}

  .grid--4 { grid-template-columns: 1fr 1fr; }

    ticket:      '<path d="M4 6a2 2 0 0 0-2 2v2a2 2 0 0 1 0 4v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a2 2 0 0 1 0-4V8a2 2 0 0 0-2-2Z"/><path d="M13 6v12"/>',
    euro:        '<circle cx="12" cy="12" r="9"/><path d="M15.5 8.5A4 4 0 0 0 9 12a4 4 0 0 0 6.5 3.5M7.5 11h5M7.5 13h5"/>',
    search:      '<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
    stethoscope: '<path d="M4 3v6a5 5 0 0 0 10 0V3"/><path d="M3 3h2M13 3h2"/><path d="M9 18a4 4 0 0 0 8 0v-3"/><circle cx="20" cy="13" r="2"/>',
    heart:       '<path d="M12 21s-7.5-4.3-7.5-9.5A4.2 4.2 0 0 1 12 7.2 4.2 4.2 0 0 1 19.5 11.5C19.5 16.7 12 21 12 21Z"/>',
    growth:      '<path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/><path d="M19 7h-3M19 7v3"/>',
  };
  function iconHTML(name) {
    const p = UI_ICONS[name];
    if (!p) return name; // si no es un icono conocido, se muestra tal cual (emoji/texto)
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + p + '</svg>';
  }

  /* ====================================================================
     RENDERIZADO POR SECCIONES
     ==================================================================== */

  function renderSEO(c) {
    const s = c.seo;
    document.title = s.titulo;
    const setMeta = (sel, val) => { const m = $(sel); if (m && val != null) m.setAttribute("content", val); };
    setMeta('meta[name="description"]', s.descripcion);
    setMeta('meta[property="og:title"]', s.titulo);
    setMeta('meta[property="og:description"]', s.descripcion);
    setMeta('meta[property="og:image"]', s.imagenCompartir);
    setMeta('meta[property="og:url"]', s.url);
    setMeta('meta[name="twitter:title"]', s.titulo);
    setMeta('meta[name="twitter:description"]', s.descripcion);
    setMeta('meta[name="twitter:image"]', s.imagenCompartir);
  }

  function renderMarca(c) {
    const m = c.marca;
    const logoHTML = m.logoImagen
      ? `<img src="${m.logoImagen}" alt="${m.nombre}">`
      : m.logoTexto;
    const nav = $("#nav-logo"); if (nav) nav.innerHTML = logoHTML;
    const foot = document.getElementById("footer-logo");
    if (foot) foot.innerHTML = m.logoImagen ? `<img src="${m.logoImagen}" alt="${m.nombre}">` : (m.logoTexto || m.nombre);
  }

  function renderHero(c) {
    const h = c.hero;
    setText("hero-badge", h.etiqueta);
    // Título con resalte lavanda en la parte indicada (h.resalte)
    const titleEl = document.getElementById("hero-title");
    if (titleEl) {
      let t = h.titulo || "";
      if (h.resalte && t.indexOf(h.resalte) !== -1) {
        t = t.replace(h.resalte, `<mark class="hl">${h.resalte}</mark>`);
      }
      titleEl.innerHTML = t;
    }
    setText("hero-subtitle", h.subtitulo);
    setText("hero-cta", h.textoBoton);
    // Botón secundario opcional (estilo "Ver temario" de eventos.jaldun.com)
    const cta2 = document.getElementById("hero-cta2");
    if (cta2) {
      if (h.textoBotonSecundario) cta2.textContent = h.textoBotonSecundario;
      else cta2.style.display = "none";
    }
    const img = $("#hero-image");
    if (img) { img.src = h.imagen; img.alt = h.imagenAlt || h.titulo; }

    // Datos clave como bloques etiqueta/valor separados por filetes (igual que eventos.jaldun.com)
    const meta = $("#hero-meta");
    const metaItems = [
      { l: "Fecha",     v: h.fecha },
      { l: "Hora",      v: h.hora },
      { l: "Modalidad", v: h.modalidad },
      { l: "Lugar",     v: h.ciudad },
    ].filter(p => p.v);
    meta.innerHTML = "";
    metaItems.forEach(p => meta.appendChild(el("div", "hero__meta-item",
      `<span class="hero__meta-label">${p.l}</span><span class="hero__meta-value">${p.v}</span>`)));
  }

  function renderTicker(c) {
    const t = $("#ticker");
    if (!t) return;
    const h = c.hero;
    const items = [h.modalidad, c.marca.nombre, h.ciudad, h.fecha].filter(Boolean);
    const oneSet = items.map(x => `<span class="ticker__item">${x}</span>`).join("");
    // Se repite para llenar el ancho y se duplica (mitad + mitad) para un bucle continuo sin huecos
    const half = oneSet.repeat(4);
    t.innerHTML = '<div class="ticker__track">' + half + half + '</div>';
  }

  function initCountdown(c) {
    const box = $("#countdown");
    if (!box || !c.hero.cuentaAtras) return;
    const target = new Date(c.hero.cuentaAtras).getTime();
    if (isNaN(target)) { box.style.display = "none"; return; }

    const units = [
      { k: "días",  ms: 86400000 },
      { k: "horas", ms: 3600000 },
      { k: "min",   ms: 60000 },
      { k: "seg",   ms: 1000 },
    ];
    box.innerHTML = units.map(u =>
      `<div class="cd"><span class="cd__num" data-k="${u.k}">--</span><span class="cd__lbl">${u.k}</span></div>`
    ).join("");

    const nums = {};
    box.querySelectorAll(".cd__num").forEach(n => { nums[n.dataset.k] = n; });

    let timer;
    function tick() {
      let diff = target - Date.now();
      if (diff <= 0) {
        box.innerHTML = '<div class="cd cd--done">¡La formación ya ha comenzado!</div>';
        if (timer) clearInterval(timer);
        return;
      }
      units.forEach(u => {
        const v = Math.floor(diff / u.ms);
        diff -= v * u.ms;
        if (nums[u.k]) nums[u.k].textContent = String(v).padStart(2, "0");
      });
    }
    tick();
    timer = setInterval(tick, 1000);
  }

  function renderSobre(c) {
    const s = c.sobreCurso;
    setText("sobre-title", s.titulo);
    setText("sobre-desc", s.descripcion);
    const grid = $("#sobre-bloques");
    s.bloques.forEach(b => {
      grid.appendChild(el("div", "card reveal",
        `<div class="card__icon">${iconHTML(b.icono)}</div>
         <h3 class="card__title">${b.titulo}</h3>
         <p class="card__text">${b.texto}</p>`));
    });
  }

  function renderTemario(c) {
    const t = c.temario;
    setText("temario-eyebrow", t.etiqueta || "");
    setText("temario-title", t.titulo);
    setText("temario-subtitle", t.subtitulo);
    const grid = $("#temario-grid");
    t.temas.forEach(tema => {
      grid.appendChild(el("div", "topic",
        `<span class="topic__num">${tema.numero}</span>
         <h3 class="card__title">${tema.titulo}</h3>
         <p class="card__text">${tema.texto}</p>`));
    });
    const nota = document.getElementById("temario-nota");
    if (nota) { if (t.nota) nota.textContent = t.nota; else nota.style.display = "none"; }
  }

  function socialLinks(redes, baseClass) {
    if (!redes) return "";
    return Object.entries(redes)
      .filter(([k, url]) => url && ICONS[k])
      .map(([k, url]) => `<a href="${url}" target="_blank" rel="noopener" aria-label="${k}">${ICONS[k]}</a>`)
      .join("");
  }

  function renderPonentes(c) {
    const p = c.ponentes;
    setText("ponentes-title", p.titulo);
    setText("ponentes-subtitle", p.subtitulo);
    const grid = $("#ponentes-grid");
    p.lista.forEach(po => {
      const redes = socialLinks(po.redes);
      const cargoLinea = po.cargo + (po.empresa ? " · " + po.empresa : "");
      grid.appendChild(el("div", "speaker reveal",
        `<img class="speaker__photo" src="${po.foto}" alt="${po.nombre}" loading="lazy"
              onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22116%22 height=%22116%22%3E%3Crect width=%22116%22 height=%22116%22 fill=%22%23eeeefe%22/%3E%3C/svg%3E'">
         <div class="speaker__eyebrow">${po.etiqueta || "Ponente"}</div>
         <h3 class="speaker__name">${po.nombre}</h3>
         <div class="speaker__role">${cargoLinea}</div>
         ${po.bio ? `<p class="speaker__bio">${po.bio}</p>` : ""}
         ${redes ? `<div class="speaker__social">${redes}</div>` : ""}`));
    });
  }

  function renderEvento(c) {
    const e = c.evento;
    setText("evento-title", e.titulo);
    setText("evento-subtitle", e.subtitulo);
    const grid = $("#evento-grid");
    e.datos.forEach(d => {
      grid.appendChild(el("div", "fact",
        `<div class="fact__icon">${iconHTML(d.icono)}</div>
         <div class="fact__label">${d.etiqueta}</div>
         ${d.enlace
           ? `<a class="btn btn--ghost-light btn--sm fact__cta" href="${d.enlace.href}">${d.enlace.texto}</a>`
           : `<div class="fact__value">${d.valor}</div>`}`));
    });
  }

  function renderCondiciones(c) {
    const cd = c.condiciones;
    if (!cd) return;
    setText("condiciones-eyebrow", cd.etiqueta || "");
    setText("condiciones-title", cd.titulo);
    setText("condiciones-subtitle", cd.subtitulo);
    const grid = $("#condiciones-grid");
    if (grid && Array.isArray(cd.opciones)) {
      grid.innerHTML = "";
      cd.opciones.forEach(o => {
        grid.appendChild(el("div", "price-card" + (o.featured ? " price-card--featured" : ""),
          `<span class="price-card__opt">${o.etiqueta}</span>
           <h3 class="price-card__title">${o.titulo}</h3>
           <div class="price-card__amount">${o.precio}</div>
           <p class="price-card__desc">${o.descripcion}</p>
           ${o.destacado ? `<div class="price-card__highlight">${o.destacado}</div>` : ""}`));
      });
    }
    const nota = document.getElementById("condiciones-nota");
    if (nota) { if (cd.nota) nota.textContent = cd.nota; else nota.style.display = "none"; }
  }

  function renderFormulario(c) {
    const f = c.formulario;
    setText("form-title", f.titulo);
    setText("form-subtitle", f.subtitulo);
    setText("hero-cta", c.hero.textoBoton);

    // Elementos de jerarquía del formulario (etiqueta, badge, beneficios, etiqueta del form)
    const hideIfEmpty = (id, val) => {
      const el2 = document.getElementById(id);
      if (!el2) return;
      if (val) el2.textContent = val; else el2.style.display = "none";
    };
    hideIfEmpty("form-eyebrow", f.etiqueta);
    hideIfEmpty("form-badge", f.badge);
    hideIfEmpty("form-embed-label", f.etiquetaForm);

    const benefitsEl = document.getElementById("form-benefits");
    if (benefitsEl) {
      if (Array.isArray(f.beneficios) && f.beneficios.length) {
        const check = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
        benefitsEl.innerHTML = f.beneficios.map(b => `<li>${check}<span>${b}</span></li>`).join("");
      } else {
        benefitsEl.style.display = "none";
      }
    }

    // Inyecta el formulario embebido (iframe del sistema de Jaldún)
    const mount = $("#form-embed");
    if (!mount || !f.iframeSrc) return;

    const id = f.iframeId || "jaldun-form";
    // Iframe SIMPLE, SIN el script form_embed.js de GoHighLevel.
    // Ese script forzaba el formulario a modo "popup" (con botón ✕) dentro de una
    // caja de ~500px con scroll interno (malo para conversión) y le ponía anchos en
    // píxeles que se salían de la tarjeta. Cargando el formulario directamente se
    // muestra como página completa (≈998px de alto) y el CSS le da una altura fija
    // que lo contiene SIN scroll interno. Si en el futuro cambias el formulario y su
    // alto varía, ajusta la altura en css/styles.css (#form-embed iframe).
    mount.innerHTML =
      `<iframe src="${f.iframeSrc}"
        style="width:100%;border:none;background:transparent;display:block"
        id="inline-${id}"
        title="${f.titulo}"
        loading="lazy"></iframe>`;
  }

  function renderFooter(c) {
    const f = c.footer;
    setText("footer-desc", f.descripcion);
    setText("footer-contacto", f.contacto);
    const email = $("#footer-email");
    if (email) { email.textContent = f.email; email.href = "mailto:" + f.email; }
    const phone = $("#footer-phone");
    if (phone) { phone.textContent = f.telefono; phone.href = "tel:" + f.telefono.replace(/\s/g, ""); }
    const web = $("#footer-web");
    if (web) { web.textContent = f.web; web.href = f.web.startsWith("http") ? f.web : "https://" + f.web; }
    $("#footer-social").innerHTML = socialLinks(f.redes);
    const links = $("#footer-links");
    f.enlaces.forEach(l => {
      const a = el("a", null, l.texto); a.href = l.url; links.appendChild(a);
    });
    setText("footer-copy", "© " + new Date().getFullYear() + " " + f.copyright);
  }

  function renderSchema(c) {
    const data = {
      "@context": "https://schema.org",
      "@type": "EducationEvent",
      "name": c.hero.titulo,
      "description": c.seo.descripcion,
      "startDate": "",
      "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
      "location": { "@type": "Place", "name": c.hero.ciudad },
      "image": [c.seo.imagenCompartir],
      "organizer": { "@type": "Organization", "name": c.marca.nombre, "url": c.seo.url }
    };
    const tag = $("#schema-event");
    if (tag) tag.textContent = JSON.stringify(data, null, 2);
  }

  /* ====================================================================
     INTERACCIONES GLOBALES
     ==================================================================== */

  function initScroll() {
    const nav = $("#navbar");
    const onScroll = () => nav.classList.toggle("scrolled", window.scrollY > 10);
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  function initReveal() {
    const items = $$(".reveal");
    if (!("IntersectionObserver" in window)) { items.forEach(i => i.classList.add("in")); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    items.forEach(i => io.observe(i));
  }

  /* ====================================================================
     ARRANQUE
     ==================================================================== */
  function init() {
    if (typeof CONFIG === "undefined") {
      console.error("No se ha cargado config.js");
      return;
    }
    renderSEO(CONFIG);
    renderMarca(CONFIG);
    renderHero(CONFIG);
    renderTicker(CONFIG);
    renderSobre(CONFIG);
    renderTemario(CONFIG);
    renderPonentes(CONFIG);
    renderEvento(CONFIG);
    renderCondiciones(CONFIG);
    renderFormulario(CONFIG);
    renderFooter(CONFIG);
    renderSchema(CONFIG);

    initScroll();
    initReveal();
    initCountdown(CONFIG);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

</script>
</body>
